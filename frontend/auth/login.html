<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - Fila Virtual</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <!-- AWS SDK for Cognito Identity -->
    <script
        src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffd900",
                        "background-dark": "#1a180e",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <script src="../js/config.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a180e;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-10">
            <div
                class="size-16 bg-primary rounded-2xl flex items-center justify-center text-background-dark shadow-xl shadow-primary/20 mx-auto mb-4">
                <svg class="size-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"
                        stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                </svg>
            </div>
            <h1 class="text-4xl font-black text-white tracking-tighter uppercase">Fila Virtual</h1>
            <p class="text-slate-400 mt-2 font-medium">Acceso para Vendedores</p>
        </div>

        <!-- Login Card -->
        <div id="card-login" class="glass rounded-3xl p-8 shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <form id="login-form">
                    <div class="mb-6">
                        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Email del
                            Vendedor</label>
                        <input type="email" id="email" required
                            class="w-full bg-black/40 border-slate-700/50 rounded-xl text-white py-3 px-4 focus:ring-primary focus:border-primary transition-all"
                            placeholder="vendedor@fila.com">
                    </div>
                    <div class="mb-8">
                        <label
                            class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Contraseña</label>
                        <input type="password" id="password" required
                            class="w-full bg-black/40 border-slate-700/50 rounded-xl text-white py-3 px-4 focus:ring-primary focus:border-primary transition-all"
                            placeholder="••••••••">
                    </div>

                    <button type="submit" id="btn-login"
                        class="w-full bg-primary hover:bg-yellow-400 text-background-dark font-black py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                        INGRESAR
                    </button>

                    <button type="button" id="btn-forgot"
                        class="w-full text-slate-500 text-xs font-bold uppercase tracking-widest mt-6 hover:text-white transition-colors">
                        ¿Olvidaste tu contraseña?
                    </button>
                </form>
            </div>
        </div>

        <!-- Position Selection Card (Hidden) -->
        <div id="card-position"
            class="glass rounded-3xl p-8 shadow-2xl hidden transition-all duration-500 transform translate-y-4">
            <div class="text-center mb-6">
                <div
                    class="size-12 bg-primary/20 rounded-xl flex items-center justify-center text-primary mx-auto mb-3">
                    <span class="material-symbols-outlined font-black">location_on</span>
                </div>
                <h2 class="text-2xl font-black text-white">Elige tu Posición</h2>
                <p class="text-slate-400 text-sm">¿En qué lugar trabajarás hoy?</p>
            </div>

            <form id="position-form">
                <div class="mb-8">
                    <label
                        class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-3 text-center">Selecciona
                        una posición disponible</label>
                    <select id="pos-select" required
                        class="w-full bg-black/40 border-slate-700/50 rounded-xl text-white py-4 px-4 focus:ring-primary focus:border-primary text-center text-xl font-bold appearance-none">
                        <option value="">Cargando posiciones...</option>
                    </select>
                </div>

                <button type="submit" id="btn-confirm-pos"
                    class="w-full bg-primary hover:bg-yellow-400 text-background-dark font-black py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                    COMENZAR JORNADA
                </button>
            </form>
        </div>

        <!-- New Password Card (Hidden) -->
        <div id="card-new-password"
            class="glass rounded-3xl p-8 shadow-2xl hidden transition-all duration-500 transform translate-y-4">
            <div class="text-center mb-6">
                <div
                    class="size-12 bg-primary/20 rounded-xl flex items-center justify-center text-primary mx-auto mb-3">
                    <span class="material-symbols-outlined font-black">lock_open</span>
                </div>
                <h2 class="text-2xl font-black text-white">Cambio Obligatorio</h2>
                <p class="text-slate-400 text-sm mt-2">Por seguridad, debes elegir una contraseña nueva y personal.</p>
            </div>

            <form id="new-password-form">
                <div class="mb-8">
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Nueva
                        Contraseña</label>
                    <input type="password" id="new-password" required minlength="8"
                        class="w-full bg-black/40 border-slate-700/50 rounded-xl text-white py-3 px-4 focus:ring-primary focus:border-primary transition-all"
                        placeholder="Mínimo 8 caracteres">
                </div>

                <button type="submit" id="btn-save-password"
                    class="w-full bg-emerald-500 hover:bg-emerald-400 text-background-dark font-black py-4 rounded-xl shadow-lg shadow-emerald-500/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                    GUARDAR Y ENTRAR
                </button>
            </form>
        </div>

        <!-- Feedback Messages -->
        <div id="msg" class="mt-6 text-center text-sm font-bold hidden px-4 py-3 rounded-xl"></div>
    </div>

    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <script>
        // Configuración de Cognito
        let userPool = null;
        let cognitoUser = null;

        function initCognito() {
            if (typeof AmazonCognitoIdentity === 'undefined') {
                showMsg('Error: No se pudo cargar el SDK de Autenticación. Revisa tu conexión a internet.', true);
                return false;
            }

            const upId = localStorage.getItem('cognitoUserPoolId') || 'us-east-1_KXpf1TsJb';
            const clId = localStorage.getItem('cognitoClientId') || '6t7oanvcu9b04ijj6l4ptgkdco';

            if (!upId || !clId || upId.includes('_xyz') || clId.includes('5xyz')) {
                showMsg('⚠️ Error: Configuración de Cognito incompleta.', true);
                return false;
            }

            const poolData = {
                UserPoolId: upId,
                ClientId: clId
            };
            userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);
            return true;
        }

        function translateError(err) {
            const msg = err.message || '';
            console.log("Cognito Error:", msg);
            if (msg.includes('Password not long enough')) return 'La contraseña es demasiado corta (mínimo 8 caracteres).';
            if (msg.includes('Password did not conform')) return 'La contraseña no cumple con las políticas (debe incluir mayúsculas, números y símbolos).';
            if (msg.includes('Incorrect username or password')) return 'Correo o contraseña incorrectos.';
            if (msg.includes('User does not exist')) return 'El usuario no existe.';
            if (msg.includes('User is not confirmed')) return 'El usuario aún no ha confirmado su cuenta.';
            if (msg.includes('Invalid parameter')) return 'Parámetros inválidos o incompletos.';
            return msg;
        }

        function showMsg(message, isError = true) {
            const el = document.getElementById('msg');
            el.textContent = message;
            el.className = `mt-6 text-center text-sm font-bold px-4 py-3 rounded-xl ${isError ? 'bg-red-500/10 text-red-500' : 'bg-emerald-500/10 text-emerald-500'}`;
            el.classList.remove('hidden');
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (!userPool && !initCognito()) return;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const authData = { Username: email, Password: password };
            const authDetails = new AmazonCognitoIdentity.AuthenticationDetails(authData);

            cognitoUser = new AmazonCognitoIdentity.CognitoUser({
                Username: email,
                Pool: userPool
            });

            document.getElementById('btn-login').disabled = true;
            document.getElementById('btn-login').textContent = 'VERIFICANDO...';

            cognitoUser.authenticateUser(authDetails, {
                onSuccess: (result) => {
                    localStorage.setItem('cognitoAccessToken', result.getAccessToken().getJwtToken());
                    localStorage.setItem('cognitoIdToken', result.getIdToken().getJwtToken());
                    localStorage.setItem('filaVirtualToken', result.getIdToken().getJwtToken());

                    const payload = result.getIdToken().decodePayload();
                    const vendedor = {
                        Nombre: payload.name || payload.email.split('@')[0],
                        Email: payload.email,
                        SucursalId: payload['custom:sucursalId'],
                        Role: payload['custom:role'] || 'vendedor'
                    };
                    localStorage.setItem('filaVirtualVendedor', JSON.stringify(vendedor));

                    // Redirección dinámica basada en rol
                    if (vendedor.Role === 'admin') {
                        window.location.href = '../admin/index.html';
                    } else {
                        // Flujo automático con posición asignada
                        const ventanilla = payload['custom:ventanilla'] || '1';
                        const vFinal = { ...vendedor, Ventanilla: ventanilla };
                        localStorage.setItem('filaVirtualVendedor', JSON.stringify(vFinal));

                        // Pequeño delay visual
                        document.getElementById('btn-login').textContent = 'BIENVENIDO #' + ventanilla;
                        setTimeout(() => {
                            window.location.href = '../terminal/index.html';
                        }, 800);
                    }
                },
                onFailure: (err) => {
                    document.getElementById('btn-login').disabled = false;
                    document.getElementById('btn-login').textContent = 'INGRESAR';
                    showMsg(translateError(err));
                },
                newPasswordRequired: (userAttributes) => {
                    // Si es la primera vez, pedimos nueva clave
                    document.getElementById('card-login').classList.add('hidden');
                    document.getElementById('card-new-password').classList.remove('hidden');
                    document.getElementById('msg').classList.add('hidden');

                    // Almacenamos the attributes temporalmente
                    window.cognitoUserAttributes = userAttributes;
                }
            });
        });

        document.getElementById('new-password-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const btn = document.getElementById('btn-save-password');
            btn.disabled = true;
            btn.textContent = 'ACTUALIZANDO...';

            cognitoUser.completeNewPasswordChallenge(newPassword, window.cognitoUserAttributes, {
                onSuccess: (result) => {
                    localStorage.setItem('cognitoAccessToken', result.getAccessToken().getJwtToken());
                    localStorage.setItem('cognitoIdToken', result.getIdToken().getJwtToken());
                    localStorage.setItem('filaVirtualToken', result.getIdToken().getJwtToken());

                    const payload = result.getIdToken().decodePayload();
                    const vendedor = {
                        Nombre: payload.name || payload.email.split('@')[0],
                        Email: payload.email,
                        SucursalId: payload['custom:sucursalId'],
                        Role: payload['custom:role'] || 'vendedor'
                    };
                    localStorage.setItem('filaVirtualVendedor', JSON.stringify(vendedor));

                    if (vendedor.Role === 'admin') {
                        window.location.href = '../admin/index.html';
                    } else {
                        // Flujo automático con posición asignada
                        const ventanilla = payload['custom:ventanilla'] || '1';
                        const vFinal = { ...vendedor, Ventanilla: ventanilla };
                        localStorage.setItem('filaVirtualVendedor', JSON.stringify(vFinal));

                        btn.textContent = '¡LISTO! #' + ventanilla;
                        setTimeout(() => {
                            window.location.href = '../terminal/index.html';
                        }, 800);
                    }
                },
                onFailure: (err) => {
                    btn.disabled = false;
                    btn.textContent = 'GUARDAR Y ENTRAR';
                    showMsg(translateError(err));
                }
            });
        });

        async function showPositionSelection(sucursalId) {
            document.getElementById('card-login').classList.add('hidden');
            document.getElementById('card-position').classList.remove('hidden');
            document.getElementById('msg').classList.add('hidden');

            const select = document.getElementById('pos-select');
            const apiUrl = window.APP_CONFIG?.API_URL || 'https://c07tv3p9hf.execute-api.us-east-1.amazonaws.com/Prod';

            try {
                // Obtener todos los vendedores para contar cuántos hay en esta sucursal
                const res = await fetch(`${apiUrl}/vendedores`);
                const json = await res.json();
                const vendedores = json.data || [];
                const vendedoresSucursal = vendedores.filter(v => v.SucursalId === sucursalId);

                // Cantidad de posiciones = cantidad de vendedores + un margen pequeño (mínimo 6)
                const totalPosiciones = Math.max(vendedoresSucursal.length, 6);

                select.innerHTML = '<option value="">-- Elige una --</option>';
                for (let i = 1; i <= totalPosiciones; i++) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.textContent = `Posición ${i}`;
                    select.appendChild(opt);
                }
            } catch (err) {
                console.error('Error cargando posiciones:', err);
                // Fallback a 10 posiciones si falla el API
                select.innerHTML = '<option value="">-- Elige una --</option>';
                for (let i = 1; i <= 10; i++) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.textContent = `Posición ${i}`;
                    select.appendChild(opt);
                }
            }
        }

        document.getElementById('position-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const pos = document.getElementById('pos-select').value;
            if (!pos) return;

            const vendedor = JSON.parse(localStorage.getItem('filaVirtualVendedor'));
            vendedor.Ventanilla = pos; // Guardamos como "Ventanilla" internamente para compatibilidad
            localStorage.setItem('filaVirtualVendedor', JSON.stringify(vendedor));

            showMsg(`Posición ${pos} seleccionada. Entrando...`, false);
            setTimeout(() => { window.location.href = '../terminal/index.html'; }, 1000);
        });

        document.getElementById('new-password-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            cognitoUser.completeNewPasswordChallenge(newPassword, {}, {
                onSuccess: () => {
                    showMsg('Contraseña actualizada. Ingresando...', false);
                    setTimeout(() => { window.location.reload(); }, 1500);
                },
                onFailure: (err) => showMsg(err.message)
            });
        });

        document.getElementById('btn-forgot').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            if (!email) return showMsg('Ingresa tu email primero');

            cognitoUser = new AmazonCognitoIdentity.CognitoUser({ Username: email, Pool: userPool });
            cognitoUser.forgotPassword({
                onSuccess: () => showMsg('Código enviado al correo', false),
                onFailure: (err) => showMsg(err.message),
                inputVerificationCode: (data) => {
                    const code = prompt('Ingresa el código que te enviamos al correo:');
                    const newPw = prompt('Ingresa tu nueva contraseña definitiva:');
                    cognitoUser.confirmPassword(code, newPw, {
                        onSuccess: () => showMsg('Contraseña rescatada exitosamente', false),
                        onFailure: (err) => showMsg(err.message)
                    });
                }
            });
        });
    </script>
</body>

</html>
